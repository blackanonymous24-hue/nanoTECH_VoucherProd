# /etc/nginx/sites-available/nanovoucher
# Puis : sudo ln -sf /etc/nginx/sites-available/nanovoucher /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# SSL : sudo certbot --nginx -d nanovoucher.com -d www.nanovoucher.com

upstream vouchernet_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name nanovoucher.com www.nanovoucher.com;

    root /var/www/vouchernet/artifacts/app/dist/public;
    index index.html;

    client_max_body_size 12m;

    # API → Node (timeouts courts pour ne pas bloquer nginx si l'API est saturée)
    location /api/ {
        proxy_pass http://vouchernet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # SSE dashboard — connexion longue, pas de buffering
    location ~ ^/api/routers/[0-9]+/dashboard-priority/stream {
        proxy_pass http://vouchernet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Assets Vite (hash) — servis directement, sans Node
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Fichiers statiques racine (logo, favicon, etc.)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|txt|json|webmanifest)$ {
        try_files $uri =404;
        expires 7d;
    }

    # SPA — page d'accueil et routes front même si l'API est lente
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
