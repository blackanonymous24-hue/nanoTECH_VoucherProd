# /etc/nginx/sites-available/nanovoucher
# Puis : sudo ln -sf /etc/nginx/sites-available/nanovoucher /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# SSL : sudo certbot --nginx -d nanovoucher.com -d www.nanovoucher.com

upstream vouchernet_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name nanovoucher.com www.nanovoucher.com;

    # Certbot ajoutera listen 443 ssl; après activation HTTPS
    location / {
        proxy_pass http://vouchernet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / long polling MikroTik dashboard
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    client_max_body_size 12m;
}
