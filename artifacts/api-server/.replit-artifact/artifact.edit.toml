kind = "web"
previewPath = "/"
title = "VoucherNet"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[services]]
name = "api"
paths = ["/"]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
run = ["pnpm", "--filter", "@workspace/api-server", "run", "start"]
build = ["sh", "-c", "pnpm --filter @workspace/app run build && pnpm --filter @workspace/api-server run build"]

[services.env]
PORT = "3001"
NODE_ENV = "development"
