kind = "web"
previewPath = "/"
title = "Système de Vente de Vouchers"
version = "1.0.0"
id = "artifacts/voucher-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20874

[services.development]
run = "pnpm --filter @workspace/voucher-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voucher-system", "run", "build" ]
publicDir = "artifacts/voucher-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20874"
BASE_PATH = "/"
