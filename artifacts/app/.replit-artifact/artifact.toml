kind = "web"
previewPath = "/"
title = "VoucherNet"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23863

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]
serve = "static"
publicDir = "dist/public"
build = [ "pnpm", "--filter", "@workspace/app", "run", "build" ]

[services.env]
PORT = "23863"
BASE_PATH = "/"
