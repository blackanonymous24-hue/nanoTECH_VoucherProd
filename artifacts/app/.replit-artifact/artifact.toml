kind = "web"
previewPath = "/"
title = "VoucherNet"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/app", "run", "build"]
run = "pnpm --filter @workspace/app run serve"

[services.env]
PORT = "5173"
BASE_PATH = "/"
