openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification - Système de vente de vouchers MikroTik
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: distributors
    description: Gestion des distributeurs
  - name: profiles
    description: Profils de connexion (forfaits)
  - name: vouchers
    description: Gestion des vouchers
  - name: sales
    description: Ventes de vouchers
  - name: dashboard
    description: Statistiques du tableau de bord
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /distributors:
    get:
      operationId: getDistributors
      tags: [distributors]
      summary: Lister tous les distributeurs
      responses:
        "200":
          description: Liste des distributeurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Distributor"
    post:
      operationId: createDistributor
      tags: [distributors]
      summary: Créer un distributeur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDistributorBody"
      responses:
        "201":
          description: Distributeur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"

  /distributors/{id}:
    get:
      operationId: getDistributor
      tags: [distributors]
      summary: Obtenir un distributeur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Distributeur trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"
        "404":
          description: Distributeur introuvable
    patch:
      operationId: updateDistributor
      tags: [distributors]
      summary: Modifier un distributeur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDistributorBody"
      responses:
        "200":
          description: Distributeur mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"
        "404":
          description: Distributeur introuvable
    delete:
      operationId: deleteDistributor
      tags: [distributors]
      summary: Supprimer un distributeur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Distributeur supprimé
        "404":
          description: Distributeur introuvable

  /vendors/login:
    post:
      operationId: vendorLogin
      tags: [distributors]
      summary: Connexion vendeur par téléphone et PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorLoginBody"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorSession"
        "401":
          description: Identifiants invalides

  /distributors/{id}/daily-stats:
    get:
      operationId: getDistributorDailyStats
      tags: [distributors]
      summary: Statistiques journalières d'un distributeur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats du distributeur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributorDailyStats"
        "404":
          description: Distributeur introuvable

  /profiles:
    get:
      operationId: getProfiles
      tags: [profiles]
      summary: Lister tous les profils
      responses:
        "200":
          description: Liste des profils
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Créer un profil
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Profil créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Obtenir un profil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profil trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profil introuvable
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Modifier un profil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profil mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profil introuvable
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Supprimer un profil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Profil supprimé
        "404":
          description: Profil introuvable

  /vouchers:
    get:
      operationId: getVouchers
      tags: [vouchers]
      summary: Lister les vouchers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [available, sold, used, expired]
        - name: profileId
          in: query
          schema:
            type: integer
        - name: batchId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Liste des vouchers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"

  /vouchers/batches:
    get:
      operationId: getVoucherBatches
      tags: [vouchers]
      summary: Lister les lots de vouchers
      responses:
        "200":
          description: Liste des lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoucherBatch"

  /vouchers/batches/{batchId}:
    get:
      operationId: getVouchersByBatch
      tags: [vouchers]
      summary: Lister les vouchers d'un lot
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vouchers du lot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"
    delete:
      operationId: deleteVoucherBatch
      tags: [vouchers]
      summary: Supprimer un lot de vouchers
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Résultat de la suppression
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required:
                  - deleted
        "404":
          description: Lot introuvable

  /vouchers/import:
    post:
      operationId: importVouchers
      tags: [vouchers]
      summary: Importer des vouchers depuis un CSV MikHmon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportVouchersBody"
      responses:
        "201":
          description: Vouchers importés
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateVouchersResponse"

  /vouchers/generate:
    post:
      operationId: generateVouchers
      tags: [vouchers]
      summary: Générer des vouchers en lot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateVouchersBody"
      responses:
        "201":
          description: Vouchers générés
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateVouchersResponse"

  /vouchers/{id}:
    delete:
      operationId: deleteVoucher
      tags: [vouchers]
      summary: Supprimer un voucher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Voucher supprimé
        "404":
          description: Voucher introuvable

  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: Lister les ventes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Liste des ventes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Vendre un voucher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Vente créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Requête invalide

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Obtenir une vente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vente trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Vente introuvable

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Statistiques générales du tableau de bord
      responses:
        "200":
          description: Statistiques
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-sales:
    get:
      operationId: getRecentSales
      tags: [dashboard]
      summary: Dernières ventes (tableau de bord)
      responses:
        "200":
          description: 10 dernières ventes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"

  /dashboard/vouchers-by-profile:
    get:
      operationId: getVouchersByProfile
      tags: [dashboard]
      summary: Répartition des vouchers disponibles par profil
      responses:
        "200":
          description: Vouchers par profil
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VouchersByProfile"

  /dashboard/distributors-daily:
    get:
      operationId: getDistributorsDailyReport
      tags: [dashboard]
      summary: Rapport de ventes journalières de tous les distributeurs
      responses:
        "200":
          description: Rapport journalier par distributeur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DistributorDailyReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        speedDownload:
          type: integer
        speedUpload:
          type: integer
        dataLimitMb:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - durationMinutes
        - speedDownload
        - speedUpload
        - dataLimitMb
        - description
        - createdAt

    CreateProfileBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        speedDownload:
          type: integer
        speedUpload:
          type: integer
        dataLimitMb:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
      required:
        - name
        - price
        - durationMinutes
        - speedDownload
        - speedUpload

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        speedDownload:
          type: integer
        speedUpload:
          type: integer
        dataLimitMb:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]

    Voucher:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        profileId:
          type: integer
        profileName:
          type: string
        status:
          type: string
          enum: [available, sold, used, expired]
        batchId:
          type: ["string", "null"]
        batchName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        soldAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - code
        - profileId
        - profileName
        - status
        - batchId
        - batchName
        - createdAt
        - soldAt

    VoucherBatch:
      type: object
      properties:
        batchId:
          type: string
        batchName:
          type: string
        profileId:
          type: integer
        profileName:
          type: string
        total:
          type: integer
        available:
          type: integer
        sold:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - batchId
        - batchName
        - profileId
        - profileName
        - total
        - available
        - sold
        - createdAt

    GenerateVouchersBody:
      type: object
      properties:
        profileId:
          type: integer
        quantity:
          type: integer
      required:
        - profileId
        - quantity

    ImportVouchersBody:
      type: object
      properties:
        profileId:
          type: integer
        csvContent:
          type: string
        batchName:
          type: string
      required:
        - profileId
        - csvContent

    GenerateVouchersResponse:
      type: object
      properties:
        count:
          type: integer
        vouchers:
          type: array
          items:
            $ref: "#/components/schemas/Voucher"
      required:
        - count
        - vouchers

    Sale:
      type: object
      properties:
        id:
          type: integer
        voucherId:
          type: integer
        voucherCode:
          type: string
        profileId:
          type: integer
        profileName:
          type: string
        amount:
          type: number
        paymentMethod:
          type: string
        operatorName:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        distributorId:
          type: ["integer", "null"]
        distributorName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - voucherId
        - voucherCode
        - profileId
        - profileName
        - amount
        - paymentMethod
        - operatorName
        - customerName
        - distributorId
        - distributorName
        - createdAt

    CreateSaleBody:
      type: object
      properties:
        profileId:
          type: integer
        paymentMethod:
          type: string
        operatorName:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        distributorId:
          type: ["integer", "null"]
      required:
        - profileId
        - paymentMethod

    Distributor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        pin:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - pin
        - status
        - createdAt

    CreateDistributorBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        pin:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
      required:
        - name

    UpdateDistributorBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        pin:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]

    VendorLoginBody:
      type: object
      properties:
        phone:
          type: string
        pin:
          type: string
      required:
        - phone
        - pin

    VendorSession:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        status:
          type: string
      required:
        - id
        - name
        - phone
        - status

    DistributorDailyStats:
      type: object
      properties:
        distributorId:
          type: integer
        distributorName:
          type: string
        vouchersSoldToday:
          type: integer
        revenueToday:
          type: number
        vouchersSoldTotal:
          type: integer
        revenueTotal:
          type: number
      required:
        - distributorId
        - distributorName
        - vouchersSoldToday
        - revenueToday
        - vouchersSoldTotal
        - revenueTotal

    DistributorDailyReport:
      type: object
      properties:
        distributorId:
          type: integer
        distributorName:
          type: string
        phone:
          type: ["string", "null"]
        status:
          type: string
        vouchersSoldToday:
          type: integer
        revenueToday:
          type: number
        vouchersSoldYesterday:
          type: integer
        revenueYesterday:
          type: number
        vouchersSoldLastWeek:
          type: integer
        revenueLastWeek:
          type: number
        vouchersSoldCurrentMonth:
          type: integer
        revenueCurrentMonth:
          type: number
        vouchersSoldTotal:
          type: integer
        revenueTotal:
          type: number
        lastSaleAt:
          type: ["string", "null"]
          format: date-time
      required:
        - distributorId
        - distributorName
        - phone
        - status
        - vouchersSoldToday
        - revenueToday
        - vouchersSoldYesterday
        - revenueYesterday
        - vouchersSoldLastWeek
        - revenueLastWeek
        - vouchersSoldCurrentMonth
        - revenueCurrentMonth
        - vouchersSoldTotal
        - revenueTotal
        - lastSaleAt

    DashboardStats:
      type: object
      properties:
        totalRevenue:
          type: number
        revenueToday:
          type: number
        vouchersSoldTotal:
          type: integer
        vouchersSoldToday:
          type: integer
        vouchersAvailable:
          type: integer
        totalProfiles:
          type: integer
      required:
        - totalRevenue
        - revenueToday
        - vouchersSoldTotal
        - vouchersSoldToday
        - vouchersAvailable
        - totalProfiles

    VouchersByProfile:
      type: object
      properties:
        profileId:
          type: integer
        profileName:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        available:
          type: integer
        sold:
          type: integer
      required:
        - profileId
        - profileName
        - price
        - durationMinutes
        - available
        - sold
